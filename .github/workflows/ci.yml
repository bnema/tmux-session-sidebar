name: CI

on:
  push:
    branches: [main]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - 'scripts/**'
      - '.github/workflows/**'
      - '.goreleaser.yaml'
      - '.golangci.yml'
  pull_request:
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - 'scripts/**'
      - '.github/workflows/**'
      - '.goreleaser.yaml'
      - '.golangci.yml'

permissions:
  contents: read
  pull-requests: read

jobs:
  ci:
    uses: bnema/gh-actions/.github/workflows/go-ci.yml@main
    with:
      go-version: stable
      test-command: make test-runtime-bootstrap && go test -race ./...
