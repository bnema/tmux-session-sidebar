name: Go CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  # Required by checkout/cache in the reusable Go CI workflow.
  contents: read
  # Required by dorny/paths-filter in the reusable workflow to classify PR file changes.
  pull-requests: read

jobs:
  go:
    uses: bnema/gh-actions/.github/workflows/go-ci.yml@main
    with:
      go-version: stable
      paths-filter: true
      paths-filter-patterns: |
        go:
          - '**.go'
          - 'go.mod'
          - 'go.sum'
          - 'Makefile'
          - 'scripts/**'
          - '.github/workflows/**'
          - '.goreleaser.yaml'
          - '.golangci.yml'
      test-command: make test-runtime-bootstrap && go test -race ./...
